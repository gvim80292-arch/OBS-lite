<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OBS Lite</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;500;700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg0: #0b0b0d;
    --bg1: #111114;
    --bg2: #18181d;
    --bg3: #1f1f26;
    --border: rgba(255,255,255,0.06);
    --border-em: rgba(255,255,255,0.12);
    --text: #e8e8ec;
    --text-muted: #6b6b7a;
    --text-dim: #3a3a47;
    --accent: #e05c3a;
    --accent-dim: rgba(224,92,58,0.15);
    --blue: #4fa3e0;
    --blue-dim: rgba(79,163,224,0.15);
    --green: #2ecc71;
    --green-dim: rgba(46,204,113,0.15);
    --mono: 'JetBrains Mono', monospace;
    --display: 'Syne', sans-serif;
  }

  html, body { height: 100%; overflow: hidden; background: var(--bg0); }

  body {
    font-family: var(--display);
    color: var(--text);
    display: flex;
    flex-direction: column;
    height: 100vh;
    user-select: none;
    -webkit-app-region: no-drag;
  }

  /* ─── TOPBAR ─── */
  #topbar {
    height: 40px;
    background: var(--bg1);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 12px;
    flex-shrink: 0;
    -webkit-app-region: drag;
  }
  #topbar * { -webkit-app-region: no-drag; }

  .logo {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
  .logo-dot.live { animation: blink 1s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .tb-sep { width: 1px; height: 18px; background: var(--border); }
  .tb-spacer { flex: 1; }

  .badge {
    font-family: var(--mono); font-size: 10px;
    padding: 2px 8px; border-radius: 3px;
    font-weight: 500; letter-spacing: 0.5px;
  }
  .badge-live { background: var(--accent); color: #fff; display: none; }
  .badge-live.show { display: inline-block; }
  .badge-rec { background: var(--accent-dim); color: var(--accent); display: none; border: 1px solid rgba(224,92,58,0.3); }
  .badge-rec.show { display: inline-block; }

  .tb-time { font-family: var(--mono); font-size: 12px; color: var(--text-muted); letter-spacing: 1px; }

  .wc-btn {
    width: 13px; height: 13px; border-radius: 50%; border: none; cursor: pointer;
    transition: opacity 0.15s;
  }
  .wc-btn:hover { opacity: 0.75; }
  #wc-close { background: #ff5f57; }
  #wc-min   { background: #febc2e; }
  #wc-max   { background: #28c840; }

  /* ─── MAIN LAYOUT ─── */
  #main {
    display: grid;
    grid-template-columns: 1fr 200px;
    grid-template-rows: 1fr 130px;
    flex: 1;
    overflow: hidden;
  }

  /* ─── PREVIEW ─── */
  #preview-wrap {
    grid-column: 1; grid-row: 1;
    background: #000;
    position: relative;
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  #preview-canvas { max-width: 100%; max-height: 100%; display: block; }
  .preview-corner {
    position: absolute;
    font-family: var(--mono); font-size: 10px;
    color: rgba(255,255,255,0.35); letter-spacing: 1px;
  }
  .preview-corner.tl { top: 10px; left: 12px; }
  .preview-corner.tr { top: 10px; right: 12px; }
  .preview-corner.bl { bottom: 10px; left: 12px; font-size: 9px; color: rgba(255,255,255,0.2); }

  /* ─── SIDEBAR ─── */
  #sidebar {
    grid-column: 2; grid-row: 1 / 3;
    background: var(--bg1);
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .side-section { border-bottom: 1px solid var(--border); padding: 12px; }
  .side-title {
    font-family: var(--mono); font-size: 9px;
    color: var(--text-dim); letter-spacing: 2px;
    text-transform: uppercase; margin-bottom: 10px;
  }

  .trans-grid { display: flex; gap: 6px; }
  .trans-opt {
    flex: 1; padding: 6px 4px;
    border: 1px solid var(--border); background: transparent;
    color: var(--text-muted); font-family: var(--mono); font-size: 9px;
    border-radius: 4px; cursor: pointer; text-align: center; letter-spacing: 0.5px;
    transition: all 0.15s;
  }
  .trans-opt:hover { border-color: var(--border-em); color: var(--text); }
  .trans-opt.active { border-color: var(--blue); color: var(--blue); background: var(--blue-dim); }

  .mix-row { margin-bottom: 10px; }
  .mix-header { display: flex; justify-content: space-between; margin-bottom: 4px; }
  .mix-name { font-family: var(--mono); font-size: 10px; color: var(--text-muted); }
  .mix-val { font-family: var(--mono); font-size: 10px; color: var(--text-dim); }
  .mix-meter-bg { height: 3px; background: var(--bg3); border-radius: 2px; margin-bottom: 5px; overflow: hidden; }
  .mix-meter-fill {
    height: 100%; border-radius: 2px;
    background: linear-gradient(90deg, var(--green) 0%, #f1c40f 75%, var(--accent) 92%);
    transition: width 0.08s; width: 0%;
  }
  .mix-slider {
    width: 100%; appearance: none; height: 2px;
    border-radius: 1px; background: var(--bg3); outline: none; cursor: pointer;
  }
  .mix-slider::-webkit-slider-thumb {
    appearance: none; width: 12px; height: 12px;
    border-radius: 50%; background: var(--text);
    border: 1px solid var(--border-em); cursor: pointer;
  }

  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .stat-card { background: var(--bg2); border-radius: 5px; padding: 7px 8px; border: 1px solid var(--border); }
  .stat-card-label { font-family: var(--mono); font-size: 8px; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
  .stat-card-val { font-family: var(--mono); font-size: 13px; color: var(--text); font-weight: 500; }
  .stat-card-val.good { color: var(--green); }
  .stat-card-val.warn { color: #f1c40f; }
  .stat-card-val.bad  { color: var(--accent); }

  #ctrl-area { padding: 12px; margin-top: auto; display: flex; flex-direction: column; gap: 6px; border-top: 1px solid var(--border); }
  .ctrl-btn {
    width: 100%; padding: 8px; border-radius: 5px;
    font-family: var(--mono); font-size: 11px; font-weight: 700;
    letter-spacing: 1px; cursor: pointer; border: 1px solid; transition: all 0.15s; text-align: center;
  }
  .ctrl-stream { background: var(--green-dim); border-color: rgba(46,204,113,0.4); color: var(--green); }
  .ctrl-stream:hover { background: rgba(46,204,113,0.25); }
  .ctrl-stream.active { background: var(--accent-dim); border-color: rgba(224,92,58,0.4); color: var(--accent); }
  .ctrl-rec { background: transparent; border-color: var(--border-em); color: var(--text-muted); }
  .ctrl-rec:hover { background: var(--bg3); color: var(--text); }
  .ctrl-rec.active { background: var(--accent-dim); border-color: rgba(224,92,58,0.4); color: var(--accent); }

  /* ─── BOTTOM PANELS ─── */
  #bottom {
    grid-column: 1; grid-row: 2;
    display: grid; grid-template-columns: 1fr 1fr;
    border-top: 1px solid var(--border); overflow: hidden;
  }
  .panel { display: flex; flex-direction: column; overflow: hidden; }
  .panel + .panel { border-left: 1px solid var(--border); }
  .panel-header {
    height: 28px; display: flex; align-items: center;
    justify-content: space-between; padding: 0 12px;
    background: var(--bg1); border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .panel-label { font-family: var(--mono); font-size: 9px; color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase; }
  .panel-add { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 16px; line-height: 1; transition: color 0.1s; }
  .panel-add:hover { color: var(--text); }
  .panel-list { flex: 1; overflow-y: auto; padding: 4px 0; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }

  .list-item {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 12px; font-size: 12px; cursor: pointer;
    color: var(--text-muted); transition: all 0.1s;
    border-left: 2px solid transparent;
  }
  .list-item:hover { background: var(--bg2); color: var(--text); }
  .list-item.active { color: var(--blue); border-left-color: var(--blue); background: var(--blue-dim); }
  .list-item-name { flex: 1; font-family: var(--display); font-weight: 500; font-size: 12px; }
  .list-item-eye { font-size: 11px; color: var(--text-dim); cursor: pointer; padding: 2px; transition: color 0.1s; }
  .list-item-eye:hover { color: var(--text); }
  .list-item-eye.hidden { color: var(--accent); }
  .scene-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
</style>
</head>
<body>

<div id="topbar">
  <div style="display:flex;gap:6px;align-items:center;margin-right:8px">
    <button class="wc-btn" id="wc-close"  onclick="window.close()"></button>
    <button class="wc-btn" id="wc-min"    onclick="minimizeWindow()"></button>
    <button class="wc-btn" id="wc-max"    onclick="maximizeWindow()"></button>
  </div>
  <div class="logo"><div class="logo-dot" id="logo-dot"></div>OBS LITE</div>
  <div class="tb-sep"></div>
  <span class="badge badge-live" id="badge-live">● AO VIVO</span>
  <span class="badge badge-rec"  id="badge-rec">⏺ REC</span>
  <div class="tb-spacer"></div>
  <span class="tb-time" id="stream-time">00:00:00</span>
  <div class="tb-sep"></div>
  <span style="font-family:var(--mono);font-size:10px;color:var(--text-dim)" id="fps-top">30 FPS</span>
</div>

<div id="main">
  <div id="preview-wrap">
    <canvas id="preview-canvas"></canvas>
    <div class="preview-corner tl" id="scene-label">CENA 1</div>
    <div class="preview-corner tr" id="res-label">1920×1080</div>
    <div class="preview-corner bl">OBS LITE v1.0</div>
  </div>

  <div id="sidebar">
    <div class="side-section">
      <div class="side-title">Transição</div>
      <div class="trans-grid">
        <button class="trans-opt active" onclick="setTrans(this,'cut')">CUT</button>
        <button class="trans-opt" onclick="setTrans(this,'fade')">FADE</button>
        <button class="trans-opt" onclick="setTrans(this,'wipe')">WIPE</button>
      </div>
    </div>
    <div class="side-section" style="flex:1;overflow-y:auto;">
      <div class="side-title">Mixer de Áudio</div>
      <div id="audio-mixer"></div>
    </div>
    <div class="side-section">
      <div class="side-title">Estatísticas</div>
      <div class="stat-grid">
        <div class="stat-card"><div class="stat-card-label">Bitrate</div><div class="stat-card-val" id="s-bitrate">—</div></div>
        <div class="stat-card"><div class="stat-card-label">CPU</div><div class="stat-card-val" id="s-cpu">—</div></div>
        <div class="stat-card"><div class="stat-card-label">Frames</div><div class="stat-card-val" id="s-frames">0</div></div>
        <div class="stat-card"><div class="stat-card-label">Drops</div><div class="stat-card-val" id="s-drops">0</div></div>
      </div>
    </div>
    <div id="ctrl-area">
      <button class="ctrl-btn ctrl-stream" id="btn-stream" onclick="toggleStream()">▶ INICIAR STREAM</button>
      <button class="ctrl-btn ctrl-rec"    id="btn-rec"    onclick="toggleRecord()">⏺ GRAVAR</button>
    </div>
  </div>

  <div id="bottom">
    <div class="panel">
      <div class="panel-header">
        <span class="panel-label">Cenas</span>
        <button class="panel-add" onclick="addScene()">+</button>
      </div>
      <div class="panel-list" id="scenes-list"></div>
    </div>
    <div class="panel">
      <div class="panel-header">
        <span class="panel-label">Fontes</span>
        <button class="panel-add" onclick="addSource()">+</button>
      </div>
      <div class="panel-list" id="sources-list"></div>
    </div>
  </div>
</div>

<script>
// Window controls (Electron)
function minimizeWindow() { try { require('electron').remote.getCurrentWindow().minimize(); } catch(e) {} }
function maximizeWindow() { try { const w = require('electron').remote.getCurrentWindow(); w.isMaximized() ? w.unmaximize() : w.maximize(); } catch(e) {} }

const SCENES = [
  { name: 'Tela Principal', color: '#0d1827', accent: '#4fa3e0', sources: ['Captura de Tela','Webcam Full','Texto Overlay'] },
  { name: 'Just Chatting', color: '#0d1f12', accent: '#2ecc71', sources: ['Webcam Full','Fundo Virtual','Alertas'] },
  { name: 'Gameplay',       color: '#1a0d27', accent: '#9b59b6', sources: ['Game Capture','Webcam PiP','HUD Overlay'] },
  { name: 'Tela de Pausa',  color: '#1a0d0d', accent: '#e05c3a', sources: ['Imagem de Pausa','Player de Música'] },
  { name: 'BRB',            color: '#1a1a0d', accent: '#f1c40f', sources: ['Animação BRB'] },
];
const SOURCE_ICONS = { 'Captura de Tela':'🖥','Webcam Full':'📷','Webcam PiP':'📷','Texto Overlay':'✏','Fundo Virtual':'🎨','Alertas':'🔔','Game Capture':'🎮','HUD Overlay':'📊','Imagem de Pausa':'🖼','Player de Música':'🎵','Animação BRB':'⏳' };
const AUDIO = [
  { name: 'Microfone', vol: 75 },
  { name: 'Desktop',   vol: 80 },
  { name: 'Música',    vol: 45 },
  { name: 'Discord',   vol: 60 },
];
const state = { activeScene:0, transition:'cut', streaming:false, recording:false, streamSeconds:0, frameCount:0, hiddenSources:new Set(), transitioning:false, drops:0 };

function renderScenes() {
  document.getElementById('scenes-list').innerHTML = SCENES.map((s,i) => `
    <div class="list-item ${i===state.activeScene?'active':''}" onclick="switchScene(${i})">
      <span class="scene-dot" style="background:${s.accent}"></span>
      <span class="list-item-name">${s.name}</span>
    </div>`).join('');
}
function renderSources() {
  const scene = SCENES[state.activeScene];
  document.getElementById('sources-list').innerHTML = scene.sources.map((s,i) => {
    const key = `${state.activeScene}-${i}`, hidden = state.hiddenSources.has(key);
    return `<div class="list-item">
      <span>${SOURCE_ICONS[s]||'📄'}</span>
      <span class="list-item-name" style="${hidden?'opacity:0.35;text-decoration:line-through':''}">${s}</span>
      <span class="list-item-eye ${hidden?'hidden':''}" onclick="toggleSource(${i},event)">${hidden?'●':'○'}</span>
    </div>`;
  }).join('');
}
function renderAudio() {
  document.getElementById('audio-mixer').innerHTML = AUDIO.map((a,i) => `
    <div class="mix-row">
      <div class="mix-header"><span class="mix-name">${a.name}</span><span class="mix-val" id="mv-${i}">${a.vol}</span></div>
      <div class="mix-meter-bg"><div class="mix-meter-fill" id="meter-${i}"></div></div>
      <input type="range" class="mix-slider" min="0" max="100" value="${a.vol}" oninput="setVol(${i},this.value)">
    </div>`).join('');
}

function switchScene(i) {
  if (state.transitioning || i===state.activeScene) return;
  state.transitioning = true;
  const canvas = document.getElementById('preview-canvas');
  const ctx = canvas.getContext('2d');
  if (state.transition==='fade') {
    let step=0; const go=setInterval(()=>{ step++; ctx.fillStyle=`rgba(0,0,0,${step*0.1})`; ctx.fillRect(0,0,canvas.width,canvas.height); if(step>=10){clearInterval(go);state.activeScene=i;state.transitioning=false;renderScenes();renderSources();updateLabel();}},20);
  } else if (state.transition==='wipe') {
    let x=0; const sc=SCENES[i]; const go=setInterval(()=>{ x+=canvas.width/12; ctx.fillStyle=sc.color; ctx.fillRect(0,0,x,canvas.height); if(x>=canvas.width){clearInterval(go);state.activeScene=i;state.transitioning=false;renderScenes();renderSources();updateLabel();}},20);
  } else { state.activeScene=i; state.transitioning=false; renderScenes(); renderSources(); updateLabel(); }
}
function updateLabel() { document.getElementById('scene-label').textContent = SCENES[state.activeScene].name.toUpperCase(); }
function toggleSource(i,e) { e.stopPropagation(); const k=`${state.activeScene}-${i}`; state.hiddenSources.has(k)?state.hiddenSources.delete(k):state.hiddenSources.add(k); renderSources(); }
function setVol(i,v) { AUDIO[i].vol=+v; document.getElementById(`mv-${i}`).textContent=v; }
function setTrans(btn,t) { state.transition=t; document.querySelectorAll('.trans-opt').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); }
function addScene() { const n=SCENES.length+1; const accents=['#4fa3e0','#2ecc71','#e05c3a','#1abc9c']; SCENES.push({name:`Nova Cena ${n}`,color:'#1a1a2e',accent:accents[n%4],sources:['Captura de Tela']}); renderScenes(); }
function addSource() { const opts=['Browser Source','Webcam PiP','Texto Overlay','Imagem de Pausa','Game Capture']; SCENES[state.activeScene].sources.push(opts[Math.floor(Math.random()*opts.length)]); renderSources(); }

let streamInterval=null;
function toggleStream() {
  state.streaming=!state.streaming;
  const btn=document.getElementById('btn-stream');
  if(state.streaming) { btn.textContent='⏹ PARAR STREAM'; btn.classList.add('active'); document.getElementById('badge-live').classList.add('show'); document.getElementById('logo-dot').classList.add('live'); streamInterval=setInterval(tickStream,1000); }
  else { btn.textContent='▶ INICIAR STREAM'; btn.classList.remove('active'); document.getElementById('badge-live').classList.remove('show'); document.getElementById('logo-dot').classList.remove('live'); clearInterval(streamInterval); document.getElementById('s-bitrate').textContent='—'; document.getElementById('s-cpu').textContent='—'; }
}
function toggleRecord() {
  state.recording=!state.recording; const btn=document.getElementById('btn-rec');
  if(state.recording){btn.textContent='⏹ PARAR GRAVAÇÃO';btn.classList.add('active');document.getElementById('badge-rec').classList.add('show');}
  else{btn.textContent='⏺ GRAVAR';btn.classList.remove('active');document.getElementById('badge-rec').classList.remove('show');}
}
function tickStream() {
  state.streamSeconds++;
  const h=String(Math.floor(state.streamSeconds/3600)).padStart(2,'0'), m=String(Math.floor((state.streamSeconds%3600)/60)).padStart(2,'0'), s=String(state.streamSeconds%60).padStart(2,'0');
  document.getElementById('stream-time').textContent=`${h}:${m}:${s}`;
  const br=5800+Math.round((Math.random()-0.5)*600), cpu=12+Math.round(Math.random()*10), drop=Math.random()>0.97?1:0;
  state.drops+=drop;
  const bEl=document.getElementById('s-bitrate'); bEl.textContent=br+' kbps'; bEl.className='stat-card-val '+(br>6000?'warn':'good');
  const cEl=document.getElementById('s-cpu'); cEl.textContent=cpu+'%'; cEl.className='stat-card-val '+(cpu>18?'warn':'good');
  const dEl=document.getElementById('s-drops'); dEl.textContent=state.drops; dEl.className='stat-card-val '+(state.drops>0?'bad':'good');
}

// Canvas
const canvas=document.getElementById('preview-canvas'), ctx=canvas.getContext('2d');
function resizeCanvas(){const w=document.getElementById('preview-wrap'); const W=w.clientWidth,H=w.clientHeight,asp=16/9; if(W/H>asp){canvas.width=Math.round(H*asp);canvas.height=H;}else{canvas.width=W;canvas.height=Math.round(W/asp);}} 
resizeCanvas(); window.addEventListener('resize',resizeCanvas);
const stars=Array.from({length:60},()=>({x:Math.random(),y:Math.random(),r:0.5+Math.random()*1.5,speed:0.0001+Math.random()*0.0003,alpha:0.1+Math.random()*0.5}));
let tick=0,lastFPS=performance.now(),fpsSamples=[],displayFPS=30;
function drawPreview(now){
  const W=canvas.width,H=canvas.height,scene=SCENES[state.activeScene]; tick++;
  const delta=now-lastFPS; if(delta>0)fpsSamples.push(1000/delta); lastFPS=now;
  if(fpsSamples.length>30){displayFPS=Math.round(fpsSamples.reduce((a,b)=>a+b,0)/fpsSamples.length);fpsSamples=[];document.getElementById('fps-top').textContent=displayFPS+' FPS';document.getElementById('s-frames').textContent=state.frameCount;}
  state.frameCount++;
  ctx.fillStyle=scene.color; ctx.fillRect(0,0,W,H);
  stars.forEach(s=>{s.x+=s.speed;if(s.x>1)s.x=0;ctx.beginPath();ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${s.alpha})`;ctx.fill();});
  ctx.strokeStyle='rgba(255,255,255,0.03)';ctx.lineWidth=1;
  for(let i=1;i<8;i++){ctx.beginPath();ctx.moveTo(W*i/8,0);ctx.lineTo(W*i/8,H);ctx.stroke();}
  for(let i=1;i<5;i++){ctx.beginPath();ctx.moveTo(0,H*i/5);ctx.lineTo(W,H*i/5);ctx.stroke();}
  const activeSrc=scene.sources.filter((_,i)=>!state.hiddenSources.has(`${state.activeScene}-${i}`));
  if(activeSrc.some(s=>s.toLowerCase().includes('webcam'))){
    const cW=W*0.22,cH=cW*0.75,cX=W-cW-16,cY=H-cH-14;
    ctx.fillStyle='rgba(0,0,0,0.6)'; roundRect(ctx,cX,cY,cW,cH,6); ctx.fill();
    ctx.strokeStyle=scene.accent+'80';ctx.lineWidth=1; roundRect(ctx,cX,cY,cW,cH,6); ctx.stroke();
    const t=tick*0.02,r=parseInt(scene.accent.slice(1,3),16),g=parseInt(scene.accent.slice(3,5),16),b=parseInt(scene.accent.slice(5,7),16);
    ctx.fillStyle=`rgba(${r},${g},${b},0.15)`;ctx.beginPath();ctx.ellipse(cX+cW*0.5+Math.sin(t)*cW*0.1,cY+cH*0.45,cW*0.22,cH*0.3,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.15)';ctx.font=`${Math.round(cH*0.12)}px 'JetBrains Mono'`;ctx.textAlign='center';ctx.fillText('WEBCAM',cX+cW/2,cY+cH-8);ctx.textAlign='left';
  }
  ctx.font=`700 ${Math.round(H*0.058)}px 'Syne'`;ctx.fillStyle='rgba(255,255,255,0.07)';ctx.fillText(scene.name.toUpperCase(),W*0.04,H*0.52+Math.round(H*0.058));
  activeSrc.slice(0,4).forEach((s,i)=>{ctx.font=`500 ${Math.round(H*0.028)}px 'JetBrains Mono'`;ctx.fillStyle=`rgba(255,255,255,${0.25-i*0.04})`;ctx.fillText('◆ '+s,W*0.04,H*0.62+i*H*0.045);});
  const grad=ctx.createLinearGradient(0,H-2,W,H-2);grad.addColorStop(0,'transparent');grad.addColorStop(0.4,scene.accent+'aa');grad.addColorStop(1,'transparent');ctx.fillStyle=grad;ctx.fillRect(0,H-2,W,2);
  if(state.streaming||state.recording){const blink=(tick%30)<20;ctx.fillStyle=blink?'#e05c3a':'transparent';ctx.beginPath();ctx.arc(W-16,14,5,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font=`500 ${Math.round(H*0.022)}px 'JetBrains Mono'`;ctx.textAlign='right';ctx.fillText(state.streaming?'LIVE':'REC',W-24,18);ctx.textAlign='left';}
  AUDIO.forEach((a,i)=>{const m=document.getElementById(`meter-${i}`);if(!m)return;const w=Math.min(100,(state.streaming||state.recording?a.vol:Math.random()*8)*(0.85+Math.random()*0.3));m.style.width=w.toFixed(0)+'%';});
  requestAnimationFrame(drawPreview);
}
function roundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}

renderScenes(); renderSources(); renderAudio();
requestAnimationFrame(drawPreview);
</script>
